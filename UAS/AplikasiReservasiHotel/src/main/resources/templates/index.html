<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sistem Reservasi Hotel</title>
    <!-- Syarat D: Layout Management Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2 class="mb-4">Daftar Reservasi Kamar</h2>
    <a href="/tambah" class="btn btn-primary mb-3">Buat Reservasi Baru</a>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th><th>Nama Tamu</th><th>Tipe Kamar</th><th>Check-in</th><th>Check-out</th>
            </tr>
        </thead>
        <tbody>
            <!-- Syarat A: Framework Thymeleaf looping data -->
            <tr th:each="res : ${daftarReservasi}">
                <td th:text="${res.id}"></td>
                <td th:text="${res.namaTamu}"></td>
                <td th:text="${res.tipeKamar}"></td>
                <td th:text="${res.tanggalCheckIn}"></td>
                <td th:text="${res.tanggalCheckOut}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
