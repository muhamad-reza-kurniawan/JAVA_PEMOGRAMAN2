<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Form Reservasi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 card p-4 shadow">
            <h3 class="mb-4 text-center">Buat Reservasi</h3>

            <!-- Alert untuk Menampilkan Pesan Error / Exception Handling -->
            <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>

            <form th:action="@{/simpan}" th:object="${reservasi}" method="post">
                <div class="mb-3">
                    <label>Nama Tamu</label>
                    <input type="text" th:field="*{namaTamu}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Tipe Kamar</label>
                    <select th:field="*{tipeKamar}" class="form-select">
                        <option value="Standard">Standard</option>
                        <option value="Deluxe">Deluxe</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>Check-In</label>
                    <input type="date" th:field="*{tanggalCheckIn}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Check-Out</label>
                    <input type="date" th:field="*{tanggalCheckOut}" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Simpan Reservasi</button>
                <a href="/" class="btn btn-secondary w-100 mt-2">Batal</a>
            </form>
        </div>
    </div>
</body>
</html>
